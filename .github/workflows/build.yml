name: Build GDExtension Addon

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons

      - name: Compile Windows 64-Bit DLL
        run: |
          scons platform=windows target=template_debug

      - name: Upload Finished DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bungee-plugin
          path: bin/
