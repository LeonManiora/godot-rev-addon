name: Build GDExtension Addon

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Godot-CPP Bindings (Direct Override)
        shell: bash
        run: |
          # Wir laden die offiziellen Godot 4.5 C++ Bindings direkt als stabiles ZIP herunter
          curl -L -o godot-cpp.zip https://github.com
          unzip godot-cpp.zip
          # Wir benennen den entpackten Ordner exakt so um, wie deine SConstruct es erwartet
          mv godot-cpp-master godot-cpp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons

      - name: Compile Windows 64-Bit DLL
        run: |
          scons platform=windows target=template_debug

      - name: Upload Finished DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bungee-plugin
          path: bin/
